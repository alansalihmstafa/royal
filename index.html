<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>ROYAL</h1>

    <input
        type="text"
        id="searchBar"
        placeholder="Search apps..."
    >
</header>

<section class="hero">
    <h2>Premium Application Hub</h2>
    <p>Download my desktop applications.</p>
</section>

<section class="apps">

    <div class="card">
        <h3>ChessBot</h3>
        <p>Advanced Chess Assistant</p>

        <a
            href="files/ChessBotSetup.exe"
            download
            class="btn"
        >
            Download
        </a>
    </div>

    <div class="card">
        <h3>MK Tool</h3>
        <p>Mortal Kombat Utility</p>

        <a
            href="files/MKToolSetup.exe"
            download
            class="btn"
        >
            Download
        </a>
    </div>

    <div class="card">
        <h3>Game Launcher</h3>
        <p>Launch all your games easily.</p>

        <a
            href="files/GameLauncherSetup.exe"
            download
            class="btn"
        >
            Download
        </a>
    </div>

</section>

<footer>
    Royal © 2026
</footer>

<script src="app.js"></script>

</body>
</html>
